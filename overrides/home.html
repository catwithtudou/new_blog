{% extends "main.html" %}

{% block tabs %}
{{ super() }}
<header class="home-hero">
  <div class="home-hero__content">
    <h1 class="home-hero__title" aria-label="always the self-reflection">
      <span id="typed-text" data-text="always the self-reflection"></span><span class="home-hero__cursor"></span>
    </h1>
  </div>
  <a class="home-hero__scroll" href="#intro-cards" aria-label="Scroll to intro">
    <span aria-hidden="true">↓</span>
  </a>
</header>
{% endblock %}

{% block content %}
<section id="intro-cards" class="home-intro">
  <div class="home-intro__container">
    <h2 class="home-intro__heading">For what?</h2>
    <div class="home-intro__cards">
      <article class="home-intro__card">
        <img class="home-intro__avatar" src="{{ 'assets/logo.jpeg' | url }}" alt="catwithtudou">
        <h3 class="home-intro__name">catwithtudou🌦️</h3>
        <blockquote class="home-intro__quote">渺小得像尘埃</blockquote>
      </article>
    </div>
  </div>
</section>
{% endblock %}

{% block footer %}
{{ super() }}
{% endblock %}
